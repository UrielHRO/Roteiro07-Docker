version: '3.8'
services:
  git-config:
    image: ubuntu:latest
    secrets:
      - git_token
    command: >
      bash -c "apt-get update && apt-get install -y git &&
      git config --global user.name 'Meu Usuario Swarm' &&
      git config --global user.token $$(cat /run/secrets/git_token) &&
      sleep infinity"
secrets:
  git_token:
    external: true